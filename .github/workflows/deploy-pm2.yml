name: Deploy Railway Monitoring

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Self-Hosted Server
    runs-on: [self-hosted]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install deps
        run: npm ci

      - name: Copy to production directory
        run: |
          sudo cp -r $GITHUB_WORKSPACE/. /opt/railway-monitoring/

      - name: Restart PM2 service
        run: |
          pm2 restart railway-monitoring --update-env || \
          pm2 start /opt/railway-monitoring/src/server.js --name railway-monitoring

      - name: Verify PM2 status
        run: pm2 status
