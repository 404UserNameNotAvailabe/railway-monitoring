name: Deploy Railway Monitoring

on:
  push:
    branches:
      - main

jobs:
  check-primary-runner:
    name: Check Primary Runner Availability
    runs-on: ubuntu-latest          # GitHub-hosted, always available
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - name: Check if shethia-farm runner is online
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(gh api repos/${{ github.repository }}/actions/runners \
            --jq '[.runners[] | select(.labels[].name == "shethia-farm")] | .[0].status // "offline"')
          echo "Runner status: $STATUS"
          if [ "$STATUS" = "online" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

  deploy-primary:
    name: Deploy to Primary
    needs: check-primary-runner
    if: needs.check-primary-runner.outputs.available == 'true'
    runs-on: [self-hosted, shethia-farm]    # runner A label
    timeout-minutes: 15                     # guard against hung steps after pickup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Runner debug info
        run: |
          whoami
          hostname
          node -v
          npm -v

      - name: Install deps & build
        run: |
          npm ci
        working-directory: ./   # repo workspace

      - name: Sync to production directory
        run: |
          sudo rsync -a --delete ./ /opt/railway-monitoring/

      - name: Restart PM2 service
        run: |
          pm2 restart railway-monitoring --update-env || \
          pm2 start /opt/railway-monitoring/src/server.js --name railway-monitoring

      - name: Verify PM2 status
        run: sudo pm2 status

  deploy-fallback:
    name: Deploy to Fallback
    needs: [check-primary-runner, deploy-primary]
    if: |
      always() && (
        needs.check-primary-runner.outputs.available != 'true' ||
        needs.deploy-primary.result == 'failure' ||
        needs.deploy-primary.result == 'cancelled'
      )
    runs-on: [self-hosted, railway]   # runner B label
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Runner debug info
        run: |
          whoami
          hostname
          node -v
          npm -v

      - name: Install deps & build
        run: |
          npm ci
        working-directory: ./

      - name: Sync to production directory
        run: |
          sudo rsync -a --delete ./ /opt/railway-monitoring/

      - name: Restart PM2 service
        run: |
          pm2 restart railway-monitoring --update-env || \
          pm2 start /opt/railway-monitoring/src/server.js --name railway-monitoring

      - name: Verify PM2 status
        run: sudo pm2 status
